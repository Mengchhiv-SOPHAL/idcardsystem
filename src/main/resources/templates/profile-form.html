<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile Form</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Create / Edit Profile</h1>
        <a class="btn gray" href="/">Back</a>
    </div>

    <form th:action="${profile.id == null} ? @{/profiles} : @{/profiles/update/{id}(id=${profile.id})}"
          th:object="${profile}"
          method="post"
          enctype="multipart/form-data">

        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" required>

        <label>Title</label>
        <input type="text" th:field="*{title}" placeholder="Student / Lecturer / Manager">

        <label>Department</label>
        <input type="text" th:field="*{department}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}">

        <label>Phone</label>
        <input type="text" th:field="*{phone}">

        <label>Profile Type</label>
        <select th:field="*{type}">
            <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
        </select>

        <label>Barcode Type</label>
        <select th:field="*{barcodeType}">
            <option th:each="barcode : ${barcodeTypes}" th:value="${barcode}" th:text="${barcode}"></option>
        </select>

        <label>Photo</label>
        <input type="file" name="photo" accept="image/png,image/jpeg">

        <button class="btn" type="submit">Save Profile</button>
    </form>
</div>

</body>
</html>
