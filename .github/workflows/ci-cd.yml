name: ID Card CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Email notification placeholder
        if: failure()
        run: |
          echo "Build failed. Email should be sent to srengty@gmail.com and commit developer."

      - name: Run Ansible Playbook after success
        if: success()
        run: |
          echo "Build and test successful."
          echo "Ansible playbook deployment stage included."